<!DOCTYPE html>
<html>
<head>
    <title>Carol's Closet Admin ☕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        h2 { color: #ff69b4; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .add-btn { background: #ff69b4; color: white; }
        .log-btn { background: #5d5d5d; color: white; }
        .loc-btn { background: #4a90e2; color: white; }
        #currentLocation { margin-top: 20px; padding: 10px; background: #eef6ff; border-radius: 10px; border: 1px dashed #4a90e2; font-size: 14px; }
        #guiOverlay, #locOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; }
        .gui-window { background: white; width: 85%; max-width: 320px; max-height: 70vh; border-radius: 20px; padding: 20px; overflow-y: auto; position: relative; }
        .close-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; float: right; font-weight: bold; }
        .log-item { background: #fff0f5; padding: 12px; margin: 10px 0; border-radius: 10px; display: flex; flex-direction: column; border-left: 5px solid #ff69b4; }
        .log-row { display: flex; justify-content: space-between; align-items: center; }
        .ticket-count { background: #ff69b4; color: white; padding: 2px 8px; border-radius: 20px; font-size: 14px; }
        .clear-single-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Carol's Closet ☕</h2>
        <input type="text" id="nameInput" placeholder="Enter Name..." autocomplete="off">
        <button class="btn add-btn" onclick="addTicket()">Add Ticket</button>
        <button class="btn log-btn" onclick="toggleGUI('guiOverlay', true)">Logged Names</button>
        <button class="btn loc-btn" onclick="toggleGUI('locOverlay', true)">Location 📍</button>
        <div id="currentLocation"><strong>Current Location:</strong> <span id="locText">Loading...</span></div>
    </div>

    <div id="guiOverlay"><div class="gui-window"><button class="close-btn" onclick="toggleGUI('guiOverlay', false)">X</button><h3 style="margin-top:0;">Logged Names ☕</h3><div id="ticketContainer"></div></div></div>
    <div id="locOverlay"><div class="gui-window"><button class="close-btn" onclick="toggleGUI('locOverlay', false)">X</button><h3 style="margin-top:0;">Set Location 📍</h3><input type="text" id="locInput" placeholder="Ex: In the garden..."><button class="btn add-btn" onclick="saveLocation()">Update Location</button></div></div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        // Replace the object below with your actual Firebase Project keys!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- REAL-TIME LISTENERS ---
        
        // This watches the "location" in the cloud and updates EVERYONE'S screen instantly
        db.ref('closetLocation').on('value', (snapshot) => {
            const loc = snapshot.val() || "Unknown";
            document.getElementById('locText').innerText = loc;
        });

        // This watches "closetData" and updates the log list for everyone
        db.ref('closetData').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            displayLogs(data);
        });

        // --- FUNCTIONS ---

        function toggleGUI(id, show) { 
            document.getElementById(id).style.display = show ? 'flex' : 'none'; 
        }

        async function addTicket() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (!name) return alert("Type a name first!");

            const ref = db.ref('closetData/' + name);
            // Get current count, add 1, and save back to cloud
            ref.transaction((currentCount) => {
                return (currentCount || 0) + 1;
            });

            input.value = "";
        }

        function saveLocation() {
            const input = document.getElementById('locInput');
            if (!input.value) return;
            db.ref('closetLocation').set(input.value);
            input.value = "";
            toggleGUI('locOverlay', false);
        }

        function displayLogs(data) {
            const container = document.getElementById('ticketContainer');
            container.innerHTML = "";
            Object.keys(data).forEach(name => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div class="log-row">
                        <strong>${name}</strong>
                        <button class="clear-single-btn" onclick="removeName('${name}')">Clear</button>
                    </div>
                    <div style="margin-top:8px;">
                        <span class="ticket-count">${data[name]} Tickets</span>
                    </div>`;
                container.appendChild(div);
            });
        }

        function removeName(n) { 
            db.ref('closetData/' + n).remove(); 
        }
    </script>
</body>
</html>
